name: myenv
channels:
  - plotly
  - anaconda
  - conda-forge
  - defaults
dependencies:
  - fire=0.5.0
  - matplotlib-base=3.7.1
  - matplotlib-inline=0.1.2
  - plotly=5.13.1
  - python=3.10.4
  - seaborn=0.11.2
  - termcolor=2.3.0
  - pip:
    - biopython==1.81
    - goatools==1.3.1
    - kaleido==0.2.1
    - numpy==1.22.4
    - pandas==1.4.3
    - pip==22.1.2
    - scikit-learn==1.0.2
    - scipy==1.7.3
    - statsmodels==0.14.0
    - questionary==1.10.0
    - ftpretty
    - rich
prefix: /opt/miniconda3/envs/myenv
